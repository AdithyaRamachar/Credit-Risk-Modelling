name: Deploy to AWS Lambda

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: credit-risk-lambda
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build --platform linux/amd64 --provenance=false \
            --output type=docker \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Update Lambda function
        run: |
          aws lambda update-function-code \
            --function-name credit-risk-api \
            --image-uri 897421226850.dkr.ecr.ap-south-1.amazonaws.com/credit-risk-lambda:latest \
            --region ap-south-1

      - name: Wait for Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name credit-risk-api \
            --region ap-south-1

      - name: Smoke test
        run: |
          curl -X POST \
            https://4qws7ghpyi.execute-api.ap-south-1.amazonaws.com/prod/predict \
            -H "Content-Type: application/json" \
            -d '{"monthly_ir":0.05,"married":1,"active_member":1,"last_transaction_month":3,"age":35,"balance":50000.0,"credit_sco":700,"engagement_score":60,"tenure_ye":5,"nums_card":2,"nums_service":3,"gender":"Male","occupation":"Engineer_IT Specialist","customer_segment":"Premium","loyalty_level":"Gold","digital_behavior":"Online","created_date":"2019-01-15","last_active_date":"2024-11-01"}'